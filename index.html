<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitelist Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white font-sans">
    <div class="flex h-screen">
        <nav class="sidebar w-64 p-6 border-r border-white/10">
            <h2 class="text-xl font-bold mb-8 text-blue-400">Panel Whitelist</h2>
            <div class="space-y-2">
                <button onclick="changeCategory('kendaraan')" class="w-full text-left p-3 rounded-lg hover:bg-blue-600/20 transition">🚗 Kendaraan</button>
                <button onclick="changeCategory('map')" class="w-full text-left p-3 rounded-lg hover:bg-blue-600/20 transition">🗺️ Map</button>
                <button onclick="changeCategory('system')" class="w-full text-left p-3 rounded-lg hover:bg-blue-600/20 transition">⚙️ System</button>
                <button onclick="changeCategory('lisensi')" class="w-full text-left p-3 rounded-lg hover:bg-blue-600/20 transition">💎 Lisensi Resmi</button>
            </div>
        </nav>
        
        <main class="flex-1 p-10 overflow-y-auto">
            <h1 id="cat-title" class="text-3xl font-bold mb-6">Pilih Kategori</h1>
            <div class="glass-card p-6 mb-8 flex gap-4">
                <input id="id-in" class="bg-slate-800 p-3 rounded-lg border border-white/10 w-1/3 outline-none focus:ring-2 ring-blue-500" placeholder="Roblox Creator ID">
                <input id="name-in" class="bg-slate-800 p-3 rounded-lg border border-white/10 w-1/3 outline-none focus:ring-2 ring-blue-500" placeholder="Nama/Grup">
                <button onclick="addData()" class="btn-add px-6 rounded-lg font-bold">Tambah Data</button>
            </div>
            <table class="w-full">
                <thead><tr class="text-left text-slate-400 border-b border-white/10"><th class="p-4">ID Kreator</th><th class="p-4">Nama</th><th class="p-4">Aksi</th></tr></thead>
                <tbody id="list"></tbody>
            </table>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
